name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: rust (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --all --all-features

  python:
    name: python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: install
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install maturin pytest pytest-cov hypothesis ruff mypy pip-licenses
      - name: build
        run: ./.venv/bin/maturin develop --release
      - name: license audit (python)
        run: |
          ./.venv/bin/pip-licenses --format=plain --allow-only="MIT;Apache;BSD;ISC;Python Software Foundation;Mozilla Public License 2.0 (MPL 2.0);The Unlicense (Unlicense);Apache Software License;BSD License;MIT License;Apache 2.0;Apache-2.0" || \
            ./.venv/bin/pip-licenses --format=plain
      - name: lint
        run: |
          ./.venv/bin/ruff check python/
          ./.venv/bin/mypy python/ --ignore-missing-imports || true
      - name: test
        run: ./.venv/bin/pytest

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
